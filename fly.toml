# Fly.io 部署設定
# flyctl launch → flyctl deploy
# https://fly.io

app = "solid-rocket-sim"
primary_region = "nrt"  # 東京，亞洲最近節點

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
